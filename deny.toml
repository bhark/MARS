# cargo-deny policy. See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
# vulnerabilities always error by design; explicit yanked/unmaintained denials
# stop a known-bad release (and its dependents) from sneaking through CI as a
# warning under the v2 defaults.
yanked       = "deny"
unmaintained = "all"
ignore       = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
    "IJG",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards         = "warn"
deny = [
    # rustls is preferred over openssl across the workspace.
    { name = "openssl-sys" },
    { name = "openssl"     },
    { name = "native-tls"  },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
