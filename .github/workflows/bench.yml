name: bench

# Runs the full Criterion suite. Trigger manually via `workflow_dispatch`
# or on the nightly schedule. Not on every PR: criterion runs are noisy on
# shared runners and would muddy the signal until baseline storage moves
# to a stable runner.

on:
  schedule:
    # 03:00 UTC nightly. shared with ci-runners' off-peak window.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      baseline_name:
        description: 'criterion baseline name to save under'
        required: false
        default: 'nightly'

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: cargo bench (criterion)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench

      - name: install proj (mars-proj FFI)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libproj-dev

      - name: compile-only smoke check (every bench target)
        run: |
          cargo bench --workspace --no-run --locked \
            --features mars-runtime/test-fixtures,mars-runtime/bench-internals

      - name: run all benches and save baseline
        env:
          BASELINE: ${{ github.event.inputs.baseline_name || 'nightly' }}
        run: |
          cargo bench --workspace --locked \
            --features mars-runtime/test-fixtures,mars-runtime/bench-internals \
            -- --save-baseline "$BASELINE"

      - name: upload criterion results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-${{ github.run_id }}
          path: target/criterion/
          retention-days: 90
