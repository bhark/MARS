name: bench

# Runs the full Criterion suite. Gates on tag pushes via release.yml (the
# baseline is named after the tag) and can be triggered manually via
# `workflow_dispatch`. Not on every PR: criterion runs are noisy on shared
# runners and would muddy the signal until baseline storage moves to a
# stable runner.

on:
  workflow_dispatch:
    inputs:
      baseline_name:
        description: 'criterion baseline name to save under'
        required: false
        default: 'manual'
  workflow_call:
    inputs:
      baseline_name:
        description: 'criterion baseline name to save under'
        required: false
        type: string
        default: 'manual'

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: cargo bench (criterion)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench

      - name: install proj (mars-proj FFI)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libproj-dev

      # scoped to crates that declare `harness = false` (criterion). a plain
      # `--workspace` blows up because the default libtest harness on every
      # other lib/bin rejects `--save-baseline`. update this list whenever a
      # new criterion bench is added.
      - name: compile-only smoke check (every criterion target)
        run: |
          cargo bench --no-run --locked \
            -p mars-artifact -p mars-expr -p mars-store-fs -p mars-proj \
            -p mars-render -p mars-runtime -p mars-compiler \
            --features mars-runtime/test-fixtures,mars-runtime/bench-internals

      - name: run all benches and save baseline
        env:
          BASELINE: ${{ inputs.baseline_name }}
        run: |
          cargo bench --locked \
            -p mars-artifact -p mars-expr -p mars-store-fs -p mars-proj \
            -p mars-render -p mars-runtime -p mars-compiler \
            --features mars-runtime/test-fixtures,mars-runtime/bench-internals \
            -- --save-baseline "$BASELINE"

      - name: upload criterion results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: criterion-${{ github.run_id }}
          path: target/criterion/
          retention-days: 90
