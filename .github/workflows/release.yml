name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  binary:
    name: build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: build release binaries
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            -p mars -p mars-compile -p mars-import-mapfile
      - name: package
        id: pkg
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          stage="mars-${ver}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp target/${{ matrix.target }}/release/mars \
             target/${{ matrix.target }}/release/mars-compile \
             target/${{ matrix.target }}/release/mars-import-mapfile \
             "dist/${stage}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          ( cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          echo "tarball=dist/${stage}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=dist/${stage}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
      - name: attach to github release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.pkg.outputs.tarball }}
            ${{ steps.pkg.outputs.sha }}

  container:
    name: build + push container image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - name: build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
