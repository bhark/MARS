name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo test --workspace --locked --all-targets

  e2e-check:
    name: cargo check (e2e gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - run: cargo check --locked --features e2e -p mars-source-postgres --tests

  deps:
    name: dependency rule + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: deps
      - name: install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: hexagonal architecture check
        run: ./scripts/check-hexagonal-architecture.sh
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
