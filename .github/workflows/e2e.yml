name: e2e

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']
  schedule:
    # 04:17 UTC nightly. an off-the-hour time keeps us out of GitHub's
    # crowded zero-minute scheduling queue.
    - cron: '17 4 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  integration:
    name: in-process integration (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: cargo test --features integration
        run: cargo test -p mars --features integration --locked -- --nocapture

  parity:
    name: render parity (osm vs mapserver goldens)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # gated: only runs on PRs with the `parity` label and on the nightly cron.
    # needs docker + the OSM extract dump fetched via MARS_PARITY_FIXTURE_URL.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'parity'))
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: parity
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: fetch parity fixture
        env:
          MARS_PARITY_FIXTURE_URL: ${{ secrets.MARS_PARITY_FIXTURE_URL }}
        run: |
          mkdir -p target/parity-fixtures
          if [ -z "${MARS_PARITY_FIXTURE_URL:-}" ]; then
            echo "::error::MARS_PARITY_FIXTURE_URL not set; cannot fetch parity dump"
            exit 1
          fi
          curl -fsSL "${MARS_PARITY_FIXTURE_URL}" -o target/parity-fixtures/osm-parity.sql.gz
      - name: run parity
        run: scripts/run-parity.sh -- --nocapture
      - name: upload diff artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: parity-output-${{ github.run_id }}
          path: target/parity-output/
          retention-days: 7

  e2e-k8s:
    name: kind e2e (operator + chart + S3 + http smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # gated: only runs on PRs with the `e2e-k8s` label and on the nightly
    # cron. mandatory-on-every-PR is reconsidered after the suite has been
    # green for >=30 consecutive nightly runs.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-k8s'))
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-k8s
      - name: install kind + helm
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: run e2e
        env:
          MARS_E2E_FIXTURE_URL: ${{ secrets.MARS_E2E_FIXTURE_URL }}
        run: scripts/run-e2e.sh
      - name: upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-output-${{ github.run_id }}
          path: target/e2e-output/
          retention-days: 7
