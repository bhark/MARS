name: e2e

on:
  pull_request:
    branches: [main]
  schedule:
    # 04:17 UTC nightly. an off-the-hour time keeps us out of GitHub's
    # crowded zero-minute scheduling queue.
    - cron: '17 4 * * *'
  # callable from release.yml on tag push. run_all forces parity + e2e-k8s
  # to run unconditionally as part of the release gate.
  workflow_call:
    inputs:
      run_all:
        description: run parity and e2e-k8s unconditionally (release gate)
        type: boolean
        default: false

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  integration:
    name: in-process integration (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: cargo test --features integration
        run: cargo test -p mars --features integration --locked -- --nocapture

  parity:
    name: render parity (osm vs mapserver goldens)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # gated: PRs with the `parity` label, nightly cron, and the release gate
    # (workflow_call from release.yml with run_all=true). needs docker; the
    # OSM extract dump is auto-fetched from the pinned GitHub Release
    # (tests/parity/fixtures/osm/manifest.sha256).
    if: |
      inputs.run_all ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'parity'))
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: parity
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: fetch parity fixture
        run: tests/parity/scripts/fetch-fixture.sh
      - name: run parity
        run: scripts/run-parity.sh --no-fetch -- --nocapture
      - name: upload diff artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: parity-output-${{ github.run_id }}
          path: target/parity-output/
          retention-days: 7

  e2e-k8s:
    name: kind e2e (operator + chart + S3 + http smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # gated: PRs with the `e2e-k8s` label, nightly cron, and the release gate
    # (workflow_call from release.yml with run_all=true). mandatory-on-every-PR
    # is reconsidered after the suite has been green for >=30 consecutive
    # nightly runs.
    if: |
      inputs.run_all ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-k8s'))
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-k8s
      - name: install kind + helm
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: run e2e
        run: scripts/run-e2e.sh
      - name: upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-output-${{ github.run_id }}
          path: target/e2e-output/
          retention-days: 7
