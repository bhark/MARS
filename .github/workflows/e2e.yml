name: e2e

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  testcontainers:
    name: in-process e2e (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
      - name: install proj build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang cmake pkg-config libsqlite3-dev sqlite3
      - name: cargo test --features e2e
        env:
          MARS_E2E: "1"
        run: cargo test -p mars --features e2e --locked -- --nocapture

  # scripts/run-e2e.sh now runs against docker compose; wiring a job
  # for it on github-hosted runners is tracked as a follow-up. the
  # in-process testcontainers job above covers the same code paths.
