apiVersion: v1
kind: Service
metadata:
  name: mars-runtime
  namespace: mars-e2e
spec:
  selector:
    app.kubernetes.io/name: mars-runtime
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-compiler
  namespace: mars-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mars-compiler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mars-compiler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mars
          image: mars:e2e
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --mode
            - compiler
            - --config
            - /etc/mars/mars.yaml
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: postgis
                  key: PG_DSN
            - name: AWS_REGION
              value: garage
            - name: AWS_DEFAULT_REGION
              value: garage
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mars-e2e-artifacts-writer
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mars-e2e-artifacts-writer
                  key: secret-access-key
          volumeMounts:
            - name: config
              mountPath: /etc/mars
            - name: cache
              mountPath: /cache
            - name: work
              mountPath: /work
      volumes:
        - name: config
          configMap:
            name: mars-service-config
        - name: cache
          emptyDir: {}
        - name: work
          emptyDir:
            sizeLimit: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-runtime
  namespace: mars-e2e
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mars-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mars-runtime
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mars
          image: mars:e2e
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --mode
            - runtime
            - --config
            - /etc/mars/mars.yaml
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: postgis
                  key: PG_DSN
            - name: AWS_REGION
              value: garage
            - name: AWS_DEFAULT_REGION
              value: garage
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mars-e2e-artifacts-writer
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mars-e2e-artifacts-writer
                  key: secret-access-key
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/mars
            - name: cache
              mountPath: /cache
      volumes:
        - name: config
          configMap:
            name: mars-service-config
        - name: cache
          emptyDir: {}
