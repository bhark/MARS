apiVersion: batch/v1
kind: Job
metadata:
  name: s3-preflight
  namespace: mars-e2e
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: preflight
          image: amazon/aws-cli:2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mars-e2e-artifacts-writer
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mars-e2e-artifacts-writer
                  key: secret-access-key
            - name: AWS_DEFAULT_REGION
              value: garage
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
          command:
            - sh
            - -ec
            - |
              endpoint="http://mars-e2e-garage.mars-e2e.svc.cluster.local:3900"
              bucket="mars-e2e-artifacts"
              key="local-e2e/preflight/${HOSTNAME}"
              printf 'probe' >/tmp/probe
              printf 'a' >/tmp/a
              printf 'b' >/tmp/b

              aws --endpoint-url "$endpoint" s3api put-object --bucket "$bucket" --key "$key/object" --body /tmp/probe
              aws --endpoint-url "$endpoint" s3api get-object --bucket "$bucket" --key "$key/object" /tmp/readback >/dev/null
              cmp /tmp/probe /tmp/readback
              aws --endpoint-url "$endpoint" s3api delete-object --bucket "$bucket" --key "$key/object" >/dev/null

              aws --endpoint-url "$endpoint" s3api put-object --bucket "$bucket" --key "$key/create-only" --body /tmp/a --if-none-match '*'
              if aws --endpoint-url "$endpoint" s3api put-object --bucket "$bucket" --key "$key/create-only" --body /tmp/b --if-none-match '*'; then
                echo "Garage accepted duplicate conditional create" >&2
                exit 1
              fi

              aws --endpoint-url "$endpoint" s3api put-object --bucket "$bucket" --key "$key/current" --body /tmp/a --if-none-match '*'
              etag="$(aws --endpoint-url "$endpoint" s3api head-object --bucket "$bucket" --key "$key/current" --query ETag --output text)"
              aws --endpoint-url "$endpoint" s3api put-object --bucket "$bucket" --key "$key/current" --body /tmp/b --if-match "$etag"
              if aws --endpoint-url "$endpoint" s3api put-object --bucket "$bucket" --key "$key/current" --body /tmp/a --if-match '"definitely-wrong"'; then
                echo "Garage accepted stale conditional update" >&2
                exit 1
              fi
