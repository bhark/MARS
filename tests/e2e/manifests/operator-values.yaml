# Helm values for the mars-operator chart in kind. images are loaded via
# `kind load docker-image` under tags matching Chart.AppVersion (the workspace
# version, post run-e2e.sh's set-version step). Non-:latest tags resolve to
# the local image under the default IfNotPresent policy.
image:
  repository: localhost/mars-operator
  # tag intentionally empty: defers to Chart.AppVersion, which run-e2e.sh
  # sets to the workspace version before `helm install`.
  tag: ""

# Operator constructs runtime/compiler image refs as `${marsImage.repository}:${Chart.AppVersion}`.
marsImage:
  repository: localhost/mars

replicaCount: 1

resources:
  requests: { cpu: 50m,  memory: 64Mi }
  limits:   { cpu: 500m, memory: 256Mi }

metrics:
  enabled: true
  port: 9090

log:
  level: info
  format: json
