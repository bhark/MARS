[package]
name        = "mars"
version.workspace = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
authors.workspace     = true
publish.workspace     = true
description = "MARS service binary. --mode {runtime|compiler|all-in-one} + validate / inspect subcommands."

[[bin]]
name = "mars"
path = "src/main.rs"

[lints]
workspace = true

[features]
default = []
# end-to-end test that spins up a postgis container; gated because docker
# is not always available. plain `cargo test` skips it.
e2e = []
# host-side parity harness against an external MapServer bundle; off by default
# because it requires a pre-captured fixture directory (MARS_DIFF_BUNDLE).
mapserver-diff = []

[dependencies]
# composition root: names every concrete adapter
mars-config         = { workspace = true }
mars-observability  = { workspace = true }
mars-runtime        = { workspace = true }
mars-compiler       = { workspace = true }
mars-http           = { workspace = true }
mars-wms            = { workspace = true }
mars-wmts           = { workspace = true }
mars-store-fs       = { workspace = true }
mars-source-postgres = { workspace = true }
mars-render         = { workspace = true }
mars-artifact       = { workspace = true }
mars-store          = { workspace = true }
mars-types          = { workspace = true }
mars-grid           = { workspace = true }
mars-bin-shared     = { workspace = true }

clap         = { workspace = true }
tokio        = { workspace = true }
tokio-util   = { workspace = true }
tracing      = { workspace = true }
anyhow       = { workspace = true }
bytes        = { workspace = true }
serde_json   = { workspace = true }
futures-util = { workspace = true }
reqwest      = { workspace = true, default-features = true, features = ["blocking"] }

[dev-dependencies]
testcontainers = { workspace = true }
tokio-postgres = { workspace = true }
png = { workspace = true }
zune-jpeg = { workspace = true }
tempfile = { workspace = true }
serde_yaml_ng = { workspace = true }
rand = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
mars-source  = { workspace = true }
async-trait  = { workspace = true }
