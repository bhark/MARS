[package]
name        = "mars-compile"
version     = "0.0.1"
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
authors.workspace     = true
publish.workspace     = true
description = "Standalone snapshot compile CLI. Reuses mars-compiler over a static source snapshot."

[[bin]]
name = "mars-compile"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
mars-config        = { workspace = true }
mars-compiler      = { workspace = true }
mars-observability = { workspace = true }

clap    = { workspace = true }
tokio   = { workspace = true }
anyhow  = { workspace = true }
tracing = { workspace = true }
