# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "labels"
  title: "Label Placement Parity"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  label_city:
    type: label
    font_family: "sans-serif"
    font_size: 13
    fill: "#101010"
    priority: 8
    min_distance: 16
    position: uc
    offset_px: [3, -4]
    angle: 15
    partials: true
    force: true

layers:
  - name: "city"
    type: point
    sources:
      - { band: detail, from: "city", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: hi, from: "city", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: mid, from: "city", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: lo, from: "city", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: overview, from: "city", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
    label:
      text: "{name}"
      style: { type: ref, name: "label_city" }

observability:
  log_level: info
  log_format: text
