# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "ogr_local"
  title: "OGR via local file path"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: pg
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}
  - id: ogr
    type: vectorfile
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}
    cache_dir: /var/cache/mars/vectorfile

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

layers:
  - name: "roads"
    type: line
    sources:
      - { source: ogr, band: detail, uri: "file:///data/roads.geojson", format: geo_json, source_crs: "EPSG:25832" }
      - { source: ogr, band: hi, uri: "file:///data/roads.geojson", format: geo_json, source_crs: "EPSG:25832" }
      - { source: ogr, band: mid, uri: "file:///data/roads.geojson", format: geo_json, source_crs: "EPSG:25832" }
      - { source: ogr, band: lo, uri: "file:///data/roads.geojson", format: geo_json, source_crs: "EPSG:25832" }
      - { source: ogr, band: overview, uri: "file:///data/roads.geojson", format: geo_json, source_crs: "EPSG:25832" }

observability:
  log_level: info
  log_format: text
