# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "multi_pass"
  title: "Multi-pass STYLE Coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

layers:
  - name: "boundaries"
    type: polygon
    sources:
      - { kind: postgis_table, band: detail, from: "boundaries", geometry_column: "geom" }
      - { kind: postgis_table, band: hi, from: "boundaries", geometry_column: "geom" }
      - { kind: postgis_table, band: mid, from: "boundaries", geometry_column: "geom" }
      - { kind: postgis_table, band: lo, from: "boundaries", geometry_column: "geom" }
      - { kind: postgis_table, band: overview, from: "boundaries", geometry_column: "geom" }
    classes:
      - name: "all"
        title: "all"
        style:
          type: passes
          passes:
            -
              fill: "#f0f0e6"
            -
              stroke: "#28283c"
              stroke_width: 4
            -
              stroke: "#dcdcf0"
              stroke_width: 1.5

observability:
  log_level: info
  log_format: text
