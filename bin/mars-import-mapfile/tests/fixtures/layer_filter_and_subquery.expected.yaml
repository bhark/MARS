# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "layer_filter_and_subquery"
  title: "Layer FILTER + Inline WHERE"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  line_streams_default:
    type: line
    fill: "#6496dc"
    stroke_width: 0.6

layers:
  - name: "streams"
    type: line
    sources:
      - { band: detail, from: "simplified.streams", geometry_column: "geom", id_column: "OGC_FID", filter: "(vandloebstype = 'Gennem sø') AND (midtebredde IN ('12-', '2.5-12'))", attributes: ["midtebredde", "vandloebstype"] }
      - { band: hi, from: "simplified.streams", geometry_column: "geom", id_column: "OGC_FID", filter: "(vandloebstype = 'Gennem sø') AND (midtebredde IN ('12-', '2.5-12'))", attributes: ["midtebredde", "vandloebstype"] }
      - { band: mid, from: "simplified.streams", geometry_column: "geom", id_column: "OGC_FID", filter: "(vandloebstype = 'Gennem sø') AND (midtebredde IN ('12-', '2.5-12'))", attributes: ["midtebredde", "vandloebstype"] }
      - { band: lo, from: "simplified.streams", geometry_column: "geom", id_column: "OGC_FID", filter: "(vandloebstype = 'Gennem sø') AND (midtebredde IN ('12-', '2.5-12'))", attributes: ["midtebredde", "vandloebstype"] }
      - { band: overview, from: "simplified.streams", geometry_column: "geom", id_column: "OGC_FID", filter: "(vandloebstype = 'Gennem sø') AND (midtebredde IN ('12-', '2.5-12'))", attributes: ["midtebredde", "vandloebstype"] }
    classes:
      - { name: "default", title: "default", style: { type: ref, name: "line_streams_default" } }

observability:
  log_level: info
  log_format: text
