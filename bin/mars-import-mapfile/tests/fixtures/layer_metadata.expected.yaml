# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "layer_meta"
  title: "Layer Metadata Coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

layers:
  - name: "roads"
    title: "Road network"
    abstract: "Major and minor roads"
    type: line
    wms:
      opaque: false
      advertised_crs:
        - "EPSG:25832"
        - "EPSG:3857"
    ows:
      keywords:
        - "roads"
        - "transport"
        - "network"
      metadata_urls:
        - type: "ISO19115:2003"
          format: "text/xml"
          href: "https://example.org/md/roads.xml"
      authorities:
        - name: "isri"
          href: "https://example.org/isri"
      identifiers:
        - authority: "isri"
          value: "urn:layer:roads"
      attribution:
        title: "Acme Roads"
        online_resource: "https://acme.example/"
        logo:
          format: "image/png"
          href: "https://acme.example/logo.png"
          width: 120
          height: 80
      include_items:
        mode: explicit
        names:
          - "name"
          - "kind"
      request_gating:
        wms_get_capabilities: true
        wms_get_map: true
        wms_get_feature_info: true
        wms_get_legend_graphic: true
        wms_get_styles: false
        wms_describe_layer: false
        wmts_get_capabilities: true
        wmts_get_tile: true
        wmts_get_feature_info: false
    sources:
      - { kind: postgis_table, band: detail, from: "roads", geometry_column: "geom" }
      - { kind: postgis_table, band: hi, from: "roads", geometry_column: "geom" }
      - { kind: postgis_table, band: mid, from: "roads", geometry_column: "geom" }
      - { kind: postgis_table, band: lo, from: "roads", geometry_column: "geom" }
      - { kind: postgis_table, band: overview, from: "roads", geometry_column: "geom" }

observability:
  log_level: info
  log_format: text
