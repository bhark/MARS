# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "attr_driven"
  title: "Attribute-Driven Style Coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  point_wind_all:
    type: point
    fill: "#505050"
    marker: { kind: circle, size: "[icon_size]", angle: "[bearing]" }
  label_wind__all:
    type: label
    font_family: "sans"
    font_size: 12
    fill: "#000000"
    angle: "[text_angle]"

layers:
  - name: "wind"
    type: point
    sources:
      - { band: detail, from: "wind", geometry_column: "geom", attributes: ["name"] }
      - { band: hi, from: "wind", geometry_column: "geom", attributes: ["name"] }
      - { band: mid, from: "wind", geometry_column: "geom", attributes: ["name"] }
      - { band: lo, from: "wind", geometry_column: "geom", attributes: ["name"] }
      - { band: overview, from: "wind", geometry_column: "geom", attributes: ["name"] }
    classes:
      - name: "all"
        title: "all"
        style: { type: ref, name: "point_wind_all" }
        label:
          text: "{name}"
          style: { type: ref, name: "label_wind__all" }

observability:
  log_level: info
  log_format: text
