# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "groups"
  title: "WMS Layer Grouping Coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

source:
  type: postgis
  dsn: "${PG_DSN}"
  native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

layers:
  - name: "Basis_kort_root"
    title: "Basis kort"
    abstract: "Foundation cartography group"
    type: polygon
    group: "/Basis"
    ows:
      keywords:
        - "basis"
        - "foundation"
      metadata_urls:
        - type: "ISO19115:2003"
          format: "text/xml"
          href: "https://example.org/md/basis.xml"
      request_gating:
        wms_get_capabilities: true
        wms_get_map: false
  - name: "basemap"
    type: polygon
    group: "/Basis"
    sources:
      - { band: detail, from: "basemap", geometry_column: "geom" }
      - { band: hi, from: "basemap", geometry_column: "geom" }
      - { band: mid, from: "basemap", geometry_column: "geom" }
      - { band: lo, from: "basemap", geometry_column: "geom" }
      - { band: overview, from: "basemap", geometry_column: "geom" }
  - name: "bygning"
    type: polygon
    group: "/Adresse/Bygning"
    sources:
      - { band: detail, from: "bygning", geometry_column: "geom" }
      - { band: hi, from: "bygning", geometry_column: "geom" }
      - { band: mid, from: "bygning", geometry_column: "geom" }
      - { band: lo, from: "bygning", geometry_column: "geom" }
      - { band: overview, from: "bygning", geometry_column: "geom" }
  - name: "ungrouped"
    type: line
    sources:
      - { band: detail, from: "lines", geometry_column: "geom" }
      - { band: hi, from: "lines", geometry_column: "geom" }
      - { band: mid, from: "lines", geometry_column: "geom" }
      - { band: lo, from: "lines", geometry_column: "geom" }
      - { band: overview, from: "lines", geometry_column: "geom" }

observability:
  log_level: info
  log_format: text
