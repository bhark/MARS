# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "labels"
  title: "Line Label Placement"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

source:
  type: postgis
  dsn: "${PG_DSN}"
  native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  label_streets:
    type: label
    font_family: "serif"
    font_size: 11
    fill: "#1e1e1e"
    halo: { color: "#fafafa", width: 1.5 }
    priority: 6
    min_distance: 40

layers:
  - name: "streets"
    type: line
    sources:
      - { band: detail, from: "streets", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: hi, from: "streets", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: mid, from: "streets", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: lo, from: "streets", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
      - { band: overview, from: "streets", geometry_column: "geom", id_column: "OGC_FID", attributes: ["name"] }
    label:
      text: "{name}"
      style: { type: ref, name: "label_streets" }
      placement: { kind: line, repeat_m: 250, max_angle_delta_deg: 25, angle_mode: follow }

observability:
  log_level: info
  log_format: text
