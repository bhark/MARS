# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "label_class"
  title: "Per-class label coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  line_roads_major:
    type: line
    fill: "#dc6464"
    stroke_width: 2
  label_roads__major:
    type: label
    font_family: "sans"
    font_size: 11
    fill: "#000000"
    halo: { color: "#ffffff", width: 2 }
    priority: 8
  line_roads_minor:
    type: line
    fill: "#a0a0a0"
    stroke_width: 1
  label_roads__minor:
    type: label
    font_family: "sans"
    font_size: 9
    fill: "#404040"
  label_roads:
    type: label
    font_family: "sans"
    font_size: 10
    fill: "#202020"

layers:
  - name: "roads"
    type: line
    sources:
      - { band: detail, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["kind", "name", "short_name"] }
      - { band: hi, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["kind", "name", "short_name"] }
      - { band: mid, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["kind", "name", "short_name"] }
      - { band: lo, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["kind", "name", "short_name"] }
      - { band: overview, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["kind", "name", "short_name"] }
    classes:
      - name: "major"
        title: "major"
        when: "kind = 'major'"
        style: { type: ref, name: "line_roads_major" }
        label:
          text: "{short_name}"
          style: { type: ref, name: "label_roads__major" }
      - name: "minor"
        title: "minor"
        when: "kind = 'minor'"
        style: { type: ref, name: "line_roads_minor" }
        label:
          text: "{name}"
          style: { type: ref, name: "label_roads__minor" }
    label:
      text: "{name}"
      style: { type: ref, name: "label_roads" }

observability:
  log_level: info
  log_format: text
