# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "expression_ops"
  title: "Expression Operator Coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

source:
  type: postgis
  dsn: "${PG_DSN}"
  native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  line_roads_lt:
    type: line
    fill: "#c80000"
    stroke_width: 2
  line_roads_ge_keyword:
    type: line
    fill: "#c86400"
    stroke_width: 2
  line_roads_like:
    type: line
    fill: "#00c800"
    stroke_width: 1
  line_roads_csym_logic:
    type: line
    fill: "#0000c8"
    stroke_width: 1
  line_roads_negated_in:
    type: line
    fill: "#323232"
    stroke_width: 0.5
  line_roads_nameless:
    type: line
    fill: "#646464"
    stroke_width: 0.5

layers:
  - name: "roads"
    type: line
    sources:
      - { band: detail, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["active", "name", "rank"] }
      - { band: hi, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["active", "name", "rank"] }
      - { band: mid, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["active", "name", "rank"] }
      - { band: lo, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["active", "name", "rank"] }
      - { band: overview, from: "roads", geometry_column: "geom", id_column: "OGC_FID", attributes: ["active", "name", "rank"] }
    classes:
      - { name: "lt", title: "lt", when: "rank < 5", style: { type: ref, name: "line_roads_lt" } }
      - { name: "ge_keyword", title: "ge_keyword", when: "rank >= 8", style: { type: ref, name: "line_roads_ge_keyword" } }
      - { name: "like", title: "like", when: "name LIKE 'A%'", style: { type: ref, name: "line_roads_like" } }
      - { name: "csym_logic", title: "csym_logic", when: "active = TRUE AND rank != 0", style: { type: ref, name: "line_roads_csym_logic" } }
      - { name: "negated_in", title: "negated_in", when: "NOT rank IN (1, 2, 3)", style: { type: ref, name: "line_roads_negated_in" } }
      - { name: "nameless", title: "nameless", when: "name IS NULL", style: { type: ref, name: "line_roads_nameless" } }

observability:
  log_level: info
  log_format: text
