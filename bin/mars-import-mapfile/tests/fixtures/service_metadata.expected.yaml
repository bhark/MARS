# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "svc_meta"
  title: "WMS metadata title"
  abstract: "Demo service for metadata coverage"
  contact:
    person: "Pat Operator"
    position: "Lead"
    organization: "Acme Maps"
    phone: "+1-555-0100"
    fax: "+1-555-0101"
    email: "ops@acme.example"
    address:
      type: "postal"
      street: "1 Main St"
      city: "Springfield"
      state_or_province: "IL"
      postcode: "62701"
      country: "US"
  ows:
    keywords:
      - "roads"
      - "buildings"
      - "parks"
    online_resource: "https://wms.example.org/?"
    fees: "none"
    access_constraints: "CC-BY 4.0"
    encoding: "UTF-8"
  wms:
    bbox_extended: true
    sld_enabled: true
    advertised_crs:
      - "EPSG:25832"
      - "EPSG:3857"
      - "EPSG:4326"
    authorities:
      - name: "primary"
        href: "https://example.org/auth/primary"
      - name: "secondary"
        href: "https://example.org/auth/secondary"
    identifiers:
      - authority: "primary"
        value: "urn:demo:svc"
    formats:
      get_map:
        - "image/png"
        - "image/jpeg"
        - "image/webp"
      get_feature_info:
        - "text/html"
      get_legend_graphic:
        - "image/png"

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

layers:
  - name: "roads"
    type: line
    sources:
      - { band: detail, from: "roads", geometry_column: "geom" }
      - { band: hi, from: "roads", geometry_column: "geom" }
      - { band: mid, from: "roads", geometry_column: "geom" }
      - { band: lo, from: "roads", geometry_column: "geom" }
      - { band: overview, from: "roads", geometry_column: "geom" }

observability:
  log_level: info
  log_format: text
