# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "classitem_expression"
  title: "Classitem + Expression Coverage"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

sources:
  - id: default
    type: postgis
    dsn: "${PG_DSN}"
    native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  poly_ranks_hovedrute:
    type: polygon
    fill: "#c81e1e"
  poly_ranks_majors:
    type: polygon
    fill: "#1e1ec8"
  poly_ranks_naturkind:
    type: polygon
    fill: "#50a050"
  poly_ranks_matches_a:
    type: polygon
    fill: "#783cc8"
  poly_ranks_mid_band:
    type: polygon
    fill: "#3c783c"
  poly_ranks_tail:
    type: polygon
    fill: "#3c3c78"
  poly_ranks_explicit_other:
    type: polygon
    fill: "#646464"
  poly_ranks_service_road:
    type: polygon
    fill: "#966432"
  poly_ranks_highway_ci:
    type: polygon
    fill: "#326496"
  poly_ranks_default:
    type: polygon
    fill: "#dcdcdc"

layers:
  - name: "ranks"
    type: polygon
    sources:
      - { band: detail, from: "ranks", geometry_column: "geom", id_column: "OGC_FID", attributes: ["other", "rtt"] }
      - { band: hi, from: "ranks", geometry_column: "geom", id_column: "OGC_FID", attributes: ["other", "rtt"] }
      - { band: mid, from: "ranks", geometry_column: "geom", id_column: "OGC_FID", attributes: ["other", "rtt"] }
      - { band: lo, from: "ranks", geometry_column: "geom", id_column: "OGC_FID", attributes: ["other", "rtt"] }
      - { band: overview, from: "ranks", geometry_column: "geom", id_column: "OGC_FID", attributes: ["other", "rtt"] }
    classes:
      - { name: "hovedrute", title: "hovedrute", when: "rtt = 'Hovedrute'", style: { type: ref, name: "poly_ranks_hovedrute" } }
      - { name: "majors", title: "majors", when: "rtt IN (14, 15, 984)", style: { type: ref, name: "poly_ranks_majors" } }
      - { name: "naturkind", title: "naturkind", when: "rtt IN ('skovPlantage', 'agerMark', 'eng')", style: { type: ref, name: "poly_ranks_naturkind" } }
      - { name: "matches_a", title: "matches_a", when: "rtt ~ '^A'", style: { type: ref, name: "poly_ranks_matches_a" } }
      - { name: "mid_band", title: "mid_band", when: "(rtt >= 10 AND rtt <= 20)", style: { type: ref, name: "poly_ranks_mid_band" } }
      - { name: "tail", title: "tail", when: "rtt >= 100", style: { type: ref, name: "poly_ranks_tail" } }
      - { name: "explicit_other", title: "explicit_other", when: "other = 'x'", style: { type: ref, name: "poly_ranks_explicit_other" } }
      - { name: "service_road", title: "service_road", when: "rtt ~ '^Service.*Road$'", style: { type: ref, name: "poly_ranks_service_road" } }
      - { name: "highway_ci", title: "highway_ci", when: "rtt ~* 'highway'", style: { type: ref, name: "poly_ranks_highway_ci" } }
      - { name: "default", title: "default", when: "rtt = 'default'", style: { type: ref, name: "poly_ranks_default" } }

observability:
  log_level: info
  log_format: text
