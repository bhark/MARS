# Generated by mars-import-mapfile
# Operator metadata below uses ${VAR:-default} placeholders.
# Review and replace before production use.

service:
  name: "test"
  title: "Test Service"
  abstract: "Imported from mapfile"
  contact_email: ops@example.org

source:
  type: postgis
  dsn: "${PG_DSN}"
  native_crs: ${MARS_NATIVE_CRS:-EPSG:25832}

artifacts:
  store:
    type: fs
    path: "${MARS_STORE_PATH}"
  cache:
    path: "${MARS_CACHE_PATH}"
    max_size: 256MiB
    eviction: lru

scales:
  bands:
    - { name: detail, max_denom_exclusive: 2500 }
    - { name: hi, max_denom_exclusive: 12500 }
    - { name: mid, max_denom_exclusive: 50000 }
    - { name: lo, max_denom_exclusive: 250000 }
    - { name: overview, max_denom_exclusive: 10000000 }

cells:
  grid: regular
  origin: [0, 0]
  size_per_band:
    detail: ${MARS_CELL_SIZE:-1024m}
    hi: ${MARS_CELL_SIZE:-1024m}
    mid: ${MARS_CELL_SIZE:-1024m}
    lo: ${MARS_CELL_SIZE:-1024m}
    overview: ${MARS_CELL_SIZE:-1024m}
  extent:
    min_x: ${MARS_EXTENT_MIN_X:-0}
    min_y: ${MARS_EXTENT_MIN_Y:-0}
    max_x: ${MARS_EXTENT_MAX_X:-0}
    max_y: ${MARS_EXTENT_MAX_Y:-0}

interfaces:
  wms:
    enabled: true
    versions: ["1.3.0"]
    formats: ["image/png", "image/jpeg"]

styles:
  line_roads_main:
    type: line
    fill: "#bebebe"
    stroke_width: 1.6
  line_roads_other:
    type: line
    fill: "#c8c8c8"
    stroke_width: 1
  label_roads:
    type: label
    font_family: "sans"
    font_size: 10
    fill: "#000000"
    halo: { color: "#ffffff", width: 2 }

layers:
  - name: "roads"
    type: line
    sources:
      - { band: detail, from: "roads_detailed", geometry_column: "geometri", id_column: "OGC_FID", attributes: ["vejkategori"] }
      - { band: hi, from: "roads_detailed", geometry_column: "geometri", id_column: "OGC_FID", attributes: ["vejkategori"] }
      - { band: mid, from: "roads_detailed", geometry_column: "geometri", id_column: "OGC_FID", max_denom_exclusive: 25000, attributes: ["vejkategori"] }
      - { band: mid, from: "roads_simplified", geometry_column: "geometri", id_column: "OGC_FID", attributes: ["vejkategori"] }
    classes:
      - { name: "main", title: "main", when: "vejkategori = 'main'", style: { type: ref, name: "line_roads_main" } }
      - { name: "other", title: "other", when: "vejkategori IN ('other', 'local')", style: { type: ref, name: "line_roads_other" } }
    label:
      text: "{vejkategori}"
      style: { type: ref, name: "label_roads" }

observability:
  log_level: info
  log_format: text
