[package]
name        = "mars-test-support"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
publish.workspace      = true
rust-version.workspace = true
description = "Test support utilities for MARS: image-diff helpers for golden-PNG comparisons across the integration and Kind e2e suites."

[lints]
workspace = true

[features]
default = []
# docker-backed helpers (postgis, seaweedfs). pulls testcontainers + rand.
# off by default so plain `cargo test` skips docker entirely.
docker = ["dep:testcontainers", "dep:rand"]

[dependencies]
png       = { workspace = true }
zune-jpeg = { workspace = true }

testcontainers = { workspace = true, optional = true }
rand           = { workspace = true, optional = true }
