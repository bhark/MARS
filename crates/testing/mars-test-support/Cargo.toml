[package]
name        = "mars-test-support"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
publish.workspace      = true
rust-version.workspace = true
description = "Test support utilities for MARS: image-diff helpers for golden-PNG comparisons across the integration and Kind e2e suites."

[lints]
workspace = true

[features]
default = []
# docker-backed helpers (postgis, garage). pulls testcontainers + rand +
# tempfile (for the garage config tempdir); tokio is always-on for the
# definition-source fake but the docker harness uses it for the post-boot
# settle sleep and the testcontainers exec stdout reader.
docker = ["dep:testcontainers", "dep:rand", "dep:tempfile"]

[dependencies]
png       = { workspace = true }
zune-jpeg = { workspace = true }

# port-level fakes used across application crate tests. always-on: every
# downstream test consumer already pulls the port crates, so the fakes have
# no extra dependency cost.
mars-source            = { workspace = true }
mars-store             = { workspace = true }
mars-types             = { workspace = true }
mars-render-port       = { workspace = true }
mars-style             = { workspace = true }
mars-definition-source = { workspace = true }
async-trait            = { workspace = true }
bytes                  = { workspace = true }
futures-core           = { workspace = true }
futures-util           = { workspace = true }
tokio                  = { workspace = true }
tokio-stream           = { workspace = true }

testcontainers = { workspace = true, optional = true }
rand           = { workspace = true, optional = true }
tempfile       = { workspace = true, optional = true }
