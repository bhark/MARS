[package]
name        = "mars-render"
version.workspace = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
authors.workspace     = true
publish.workspace     = true
rust-version.workspace = true
description = "CPU rasteriser implementation of mars-render-port::Renderer (tiny-skia + rustybuzz)."

# criterion only; libtest harness rejects --save-baseline
[lib]
bench = false

