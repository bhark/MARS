tiny-skia        = { workspace = true }
png              = { workspace = true }
jpeg-encoder     = { workspace = true }
image-webp       = { workspace = true }

[dev-dependencies]
png              = { workspace = true }
jpeg-decoder     = { workspace = true }
criterion        = { workspace = true }

[[bench]]
name    = "draw_encode"
harness = false

[[bench]]
name    = "hatch"
harness = false
