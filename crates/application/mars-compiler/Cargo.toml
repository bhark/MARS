[package]
name        = "mars-compiler"
version     = "0.0.1"
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
authors.workspace     = true
publish.workspace     = true
description = "MARS compiler use-case: change-feed → dirty cells → rebuild → publish manifest."

[lints]
workspace = true

[dependencies]
mars-types         = { workspace = true }
mars-grid          = { workspace = true }
mars-expr          = { workspace = true }
mars-style         = { workspace = true }
mars-artifact      = { workspace = true }
mars-source        = { workspace = true }
mars-store         = { workspace = true }
mars-config        = { workspace = true }
mars-observability = { workspace = true }
tokio              = { workspace = true }
tokio-util         = { workspace = true }
tracing            = { workspace = true }
thiserror          = { workspace = true }
bytes              = { workspace = true }
serde_json         = { workspace = true }
async-trait        = { workspace = true }

[dev-dependencies]
mars-store-fs      = { workspace = true }
tokio              = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile           = "3"
futures-core       = { workspace = true }
