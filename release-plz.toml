# release-plz config. shared workspace version model:
# - every crate uses `version.workspace = true`, so bumping
#   `[workspace.package].version` bumps the whole workspace.
# - the `mars` bin crate is the anchor that owns the changelog, the
#   single tag (`vX.Y.Z`), and the single github release. all other
#   crates have `release = false` so release-plz does not produce
#   per-crate tags / releases.

[workspace]
release = false
publish = false
git_release_enable = false
git_tag_enable = false
changelog_update = false
changelog_path = "CHANGELOG.md"
pr_labels = ["release"]
pr_branch_prefix = "release-plz/"
semver_check = false

[changelog]
header = """# Changelog

All notable changes to this project are documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
commit_parsers = [
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^style",    group = "Changed" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     skip = true },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
]

[[package]]
name = "mars"
release = true
git_release_enable = true
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
changelog_update = true
