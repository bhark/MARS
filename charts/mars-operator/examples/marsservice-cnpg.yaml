# Example MarsServiceCluster (cluster-scoped catalog with bootstrap) +
# MarsService (slim, namespaced) consuming a K8s-native Postgres operator's
# Secret directly. Zero user-managed Secrets in the common case:
#   - Admin credentials are projected key-by-key out of the Postgres
#     operator's `*-superuser` Secret (CNPG shape by default).
#   - The runtime role password is operator-managed: the cluster reconciler
#     generates it on first bootstrap run and stores it in
#     `<cluster>-default-runtime-credentials` (key `password`) with an owner
#     reference to the MarsServiceCluster.
#   - MARS_RUNTIME_PASSWORD is auto-projected into the compiler/runtime
#     pods from that Secret so the DSN template can reference it.
#
# Prereqs:
#   1. A CNPG (or compatible) Cluster named `pg-cluster` running in the maps
#      namespace. CNPG provisions `pg-cluster-superuser` automatically.
#   2. S3 credentials supplied via env or IRSA at the runtime/compiler
#      pod level (see envFrom below).
apiVersion: mars.forn.dk/v1alpha1
kind: MarsServiceCluster
metadata:
  name: example-cnpg-cluster
spec:
  sourcesCatalog:
    - id: default
      type: postgis
      native_crs: "EPSG:25832"
      # MARS_RUNTIME_PASSWORD is auto-projected by the cluster reconciler
      # from the resolved runtime-credentials Secret. host/port/database
      # here also feed adminCredentialsRef's fallback resolution, so the
      # admin connection lands on the same cluster + database without
      # restating them.
      dsn: "postgresql://mars_replicator:${MARS_RUNTIME_PASSWORD}@pg-cluster-rw.maps.svc:5432/maps?sslmode=require"
      change_feed:
        type: pgoutput
        publication: mars_pub
        slot: mars_slot
      pool:
        max_size: 8
        statement_timeout_ms: 300000
        batch_send_timeout_secs: 30
      bootstrap:
        enabled: true
        # component-style admin credentials: the operator composes the admin
        # DSN by combining the named Secret keys with host/port/database
        # parsed out of the source dsn. Defaults match CNPG.
        adminCredentialsRef:
          secretName: pg-cluster-superuser
        # runtimePasswordSecretRef intentionally omitted: the operator
        # generates and manages the runtime password as a child Secret.
        teardownOnDelete:
          slot: true
          publication: true
          role: false
        role: mars_replicator
        schemas:
          - public
          - geo
  artifactStore:
    store:
      type: s3
      bucket: mars-artifacts
      region: eu-west-1
      prefix: example-cnpg/
    cache:
      path: /cache
      max_size: 1GiB
  reprojection:
    allowlist: ["EPSG:25832"]
  observability:
    log_level: info
    log_format: json
  defaults:
    compiler:
      compile_binding_parallelism: 4
      compile_in_flight_pages_budget_bytes: 512MiB
      compile_spill_dir: /work/spill
---
apiVersion: mars.forn.dk/v1alpha1
kind: MarsService
metadata:
  name: example-cnpg
  namespace: maps
spec:
  clusterRef:
    name: example-cnpg-cluster
  sources: [default]
  definition:
    inline: |
      service:
        name: example-cnpg
        title: Example MARS service (CNPG-backed Postgres)
        contact_email: ops@example.org
      scales:
        bands:
          - { name: detail, max_denom_exclusive: 12500 }
          - { name: mid, max_denom_exclusive: 250000 }
          - { name: lo, max_denom_exclusive: 10000000 }
      interfaces:
        wms:
          enabled: true
          versions: ["1.3.0"]
          formats: ["image/png"]
          max_image_dimension: 2048
          max_pixels: 4194304
      styles: {}
      layers: []

  compiler:
    storage:
      cacheSize: 2Gi
      workSize: 4Gi
    envFrom:
      - secretRef:
          name: mars-s3-credentials

  runtime:
    replicas: 2
    cache:
      sizeLimit: 2Gi
    envFrom:
      - secretRef:
          name: mars-s3-credentials
