apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mars-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mars-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      {{- include "mars-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mars-operator.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: {{ .Values.metrics.enabled | quote }}
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "mars-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          image: {{ include "mars-operator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--namespace={{ .Release.Namespace }}"
            - "--metrics-addr=0.0.0.0:{{ .Values.metrics.port }}"
            - "--health-addr=0.0.0.0:{{ .Values.health.port }}"
            - "--leader-elect={{ gt (int .Values.replicaCount) 1 }}"
            - "--log-level={{ .Values.log.level }}"
            - "--log-format={{ .Values.log.format }}"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MARS_RUNTIME_IMAGE_REPOSITORY
              value: {{ .Values.marsImage.repository | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
