{{- if .Values.rbac.create -}}
# Auto-generated by scripts/generate-clusterrole.sh. Do not edit by hand.
# Source of truth: bin/mars-operator/src/clusterrole.rs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mars-operator.fullname" . }}
  labels:
    {{- include "mars-operator.labels" . | nindent 4 }}
rules:
  # MarsService CRs (cluster-scoped read; status subresource for patches).
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsservices"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsservices/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsservices/finalizers"]
    verbs: ["update"]

  # MarsServiceCluster CRs (cluster-scoped; per-cluster catalog + bootstrap
  # reconciler). Read for the MarsService reconcile path; full CRUD on the
  # cluster reconcile path.
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsserviceclusters"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsserviceclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsserviceclusters/finalizers"]
    verbs: ["update"]

  # Owned children.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Sibling PodDisruptionBudget targeting the runtime Deployment.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets. Reads cover BYO admin/runtime Secrets the user references via
  # bootstrap.adminSecretRef / bootstrap.runtimePasswordSecretRef; writes
  # cover operator-managed Secrets (<svc>-runtime-credentials and
  # <svc>-bootstrap-admin-credentials) that the reconcile loop SSA-patches.
  # Delete keeps the verb set consistent with other owned resources and
  # supports operator-driven cleanup if the Secret layout ever changes.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events (for surfacing reconcile failures).
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader-election lease.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end -}}
