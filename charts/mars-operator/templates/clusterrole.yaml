{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mars-operator.fullname" . }}
  labels:
    {{- include "mars-operator.labels" . | nindent 4 }}
rules:
  # MarsService CRs (cluster-scoped read; status subresource for patches).
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsservices"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsservices/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["mars.forn.dk"]
    resources: ["marsservices/finalizers"]
    verbs: ["update"]

  # Owned children.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events (for surfacing reconcile failures).
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader-election lease.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end -}}
