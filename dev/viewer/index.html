<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MARS Local Dev Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.4.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@10.4.0/dist/ol.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.15.0/proj4.js"></script>
  <style>
    html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    proj4.defs('EPSG:25832', '+proj=utm +zone=32 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');
    ol.proj.proj4.register(proj4);

    const extent = [850000, 6090000, 895000, 6145000];
    const projection = ol.proj.get('EPSG:25832');
    projection.setExtent(extent);

    const map = new ol.Map({
      target: 'map',
      view: new ol.View({
        projection: projection,
        center: [(extent[0] + extent[2]) / 2, (extent[1] + extent[3]) / 2],
        resolution: 50,
      }),
      layers: [
        new ol.layer.Tile({
          source: new ol.source.TileWMS({
            url: 'http://localhost:8080/wms',
            params: {
              'LAYERS': 'land,water,settlements,roads,buildings,waterways',
              'VERSION': '1.3.0',
              'FORMAT': 'image/png',
            },
            projection: projection,
          }),
        }),
      ],
    });
  </script>
</body>
</html>
