name: mars-dev

# local dev stack: postgis + OSM seed + compiler + runtime + OL viewer.
# project-scoped via the `name:` field above so volumes/network/containers
# don't collide with the e2e stack. service hostnames match the on-disk
# config (PG_DSN points at `postgis`).

x-mars-image: &mars-image
  image: localhost/mars:dev
  build:
    context: ..
    dockerfile: Dockerfile

services:
  postgis:
    image: docker.io/postgis/postgis:18-3.6
    container_name: mars-dev-postgis
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=8
      - -c
      - max_wal_senders=8
    environment:
      POSTGRES_DB: mars
      POSTGRES_USER: mars
      POSTGRES_PASSWORD: mars
    volumes:
      - postgis-data:/var/lib/postgresql
      - ./postgis/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mars", "-d", "mars"]
      interval: 2s
      timeout: 3s
      retries: 30

  # named volumes initialise as root-owned; mars runs as uid 65532. chown
  # the artifact store before compiler/runtime start so the shared rw/ro
  # mount is writable by the nonroot user.
  init-artifact-store:
    image: docker.io/busybox:stable
    container_name: mars-dev-init-artifact-store
    command: ["chown", "-R", "65532:65532", "/var/lib/mars/store"]
    volumes:
      - artifact-store:/var/lib/mars/store
    restart: "no"

  seed:
    image: localhost/mars-seed:dev
    container_name: mars-dev-seed
    build:
      context: ./seed
    environment:
      PG_DSN: postgres://mars:mars@postgis/mars
      OSM_BBOX: "55.6,9.5,56.0,10.7"
    volumes:
      - osm-cache:/cache
    depends_on:
      postgis:
        condition: service_healthy
    profiles: ["seed"]
    restart: "no"

  compiler:
    <<: *mars-image
    container_name: mars-dev-compiler
    command: ["--mode", "compiler", "--config", "/etc/mars/mars.yaml"]
    environment:
      PG_DSN: postgres://mars:mars@postgis/mars
    volumes:
      - ./config/mars.yaml:/etc/mars/mars.yaml:ro
      - artifact-store:/var/lib/mars/store
    tmpfs:
      - /cache:mode=1777
      - /work:mode=1777
    # image HEALTHCHECK targets /healthz on 8080; compiler doesn't bind it.
    healthcheck:
      disable: true
    depends_on:
      postgis:
        condition: service_healthy
      init-artifact-store:
        condition: service_completed_successfully

  runtime:
    <<: *mars-image
    container_name: mars-dev-runtime
    command: ["--mode", "runtime", "--config", "/etc/mars/mars.yaml"]
    environment:
      PG_DSN: postgres://mars:mars@postgis/mars
    ports:
      - "8080:8080"
    volumes:
      - ./config/mars.yaml:/etc/mars/mars.yaml:ro
      - artifact-store:/var/lib/mars/store:ro
    tmpfs:
      - /cache:mode=1777
    healthcheck:
      test: ["CMD", "/usr/local/bin/mars", "healthcheck", "--url", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 24
    depends_on:
      compiler:
        condition: service_started
      init-artifact-store:
        condition: service_completed_successfully

  viewer:
    image: localhost/mars-viewer:dev
    container_name: mars-dev-viewer
    build:
      context: ./viewer
    ports:
      - "5173:80"
    depends_on:
      runtime:
        condition: service_healthy

volumes:
  postgis-data:
  artifact-store:
  osm-cache:
