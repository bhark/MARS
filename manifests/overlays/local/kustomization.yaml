apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# local-dev overlay: postgis + seed + viewer; PVCs and Secret with plaintext
# creds; artifact-store volume wired into compiler (RW) and runtime (RO);
# imagePullPolicy: IfNotPresent so locally-built images are honoured.

resources:
  - ../../base
  - pvcs.yaml
  - postgis-deployment.yaml
  - postgis-service.yaml
  - postgis-secret.yaml
  - seed-job.yaml
  - viewer.yaml

configMapGenerator:
  - name: mars-postgis-init
    files:
      - init.sql=../../../dev/postgis/init.sql
    options:
      labels:
        app.kubernetes.io/part-of: postgis

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/mars/mars
    newName: localhost/mars
    newTag: dev

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: mars

patches:
  - path: mars-config-patch.yaml
    target:
      kind: ConfigMap
      name: mars-config
  - path: compiler-volume-patch.yaml
    target:
      kind: Deployment
      name: mars-compiler
  - path: runtime-volume-patch.yaml
    target:
      kind: Deployment
      name: mars-runtime
