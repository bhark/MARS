apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-postgis
  labels:
    app.kubernetes.io/part-of: postgis
    app.kubernetes.io/component: postgis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: postgis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgis
    spec:
      containers:
        - name: postgis
          image: docker.io/postgis/postgis:18-3.6
          args:
            - postgres
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=8
            - -c
            - max_wal_senders=8
          envFrom:
            - secretRef:
                name: mars-postgis
          ports:
            - name: pg
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mars", "-d", "mars"]
            periodSeconds: 2
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: init
              mountPath: /docker-entrypoint-initdb.d/00-init.sql
              subPath: init.sql
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mars-postgis-data
        - name: init
          configMap:
            name: mars-postgis-init
