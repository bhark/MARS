apiVersion: v1
kind: Pod
metadata:
  name: mars-viewer
  labels:
    app.kubernetes.io/part-of: viewer
    app.kubernetes.io/component: viewer
spec:
  containers:
    - name: viewer
      image: localhost/mars-viewer:dev
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 80
          hostPort: 5173
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mars-viewer
  labels:
    app.kubernetes.io/part-of: viewer
    app.kubernetes.io/component: viewer
spec:
  selector:
    app.kubernetes.io/component: viewer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
