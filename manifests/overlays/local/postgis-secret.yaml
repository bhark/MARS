apiVersion: v1
kind: Secret
metadata:
  name: mars-postgis
  labels:
    app.kubernetes.io/part-of: config
type: Opaque
stringData:
  # local-dev creds. compiler/runtime read PG_DSN; postgis container reads
  # POSTGRES_*. hostname matches the postgis Service name on the same
  # podman network.
  POSTGRES_DB: mars
  POSTGRES_USER: mars
  POSTGRES_PASSWORD: mars
  PG_DSN: postgres://mars:mars@mars-postgis/mars
