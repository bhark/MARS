apiVersion: v1
kind: Pod
metadata:
  name: mars-seed
  labels:
    app.kubernetes.io/part-of: seed
    app.kubernetes.io/component: seed
spec:
  restartPolicy: Never
  # podman 5.8.x kube play crashes (nil deref in libpod.Container.Inspect)
  # when wrapping a Job in a service container. modeled as a one-shot Pod
  # instead. wait-for-postgis logic lives in the seed entrypoint.
  # convert back to a Job once the upstream bug is fixed; prod doesn't seed.
  containers:
    - name: seed
      image: localhost/mars-seed:dev
      imagePullPolicy: IfNotPresent
      env:
        - name: PG_DSN
          valueFrom:
            secretKeyRef:
              name: mars-postgis
              key: PG_DSN
        - name: OSM_BBOX
          value: "55.6,9.5,56.0,10.7"
      volumeMounts:
        - name: cache
          mountPath: /cache
  volumes:
    - name: cache
      persistentVolumeClaim:
        claimName: mars-osm-cache
