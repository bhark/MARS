apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-compiler
spec:
  template:
    spec:
      initContainers:
        - name: chown-data-dirs
          image: docker.io/library/busybox:stable
          imagePullPolicy: IfNotPresent
          command:
            - chown
            - -R
            - "65532:65532"
            - /cache
            - /work
            - /var/lib/mars/store
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: work
              mountPath: /work
            - name: artifact-store
              mountPath: /var/lib/mars/store
      containers:
        - name: compiler
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: artifact-store
              mountPath: /var/lib/mars/store
      volumes:
        - name: artifact-store
          persistentVolumeClaim:
            claimName: mars-artifact-store
