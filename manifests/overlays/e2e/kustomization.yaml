apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# e2e overlay: postgis + fixture-loader (replaces OSM seed) + compiler +
# runtime, no viewer. layers point at the e2e_source.* schema produced by
# tests/e2e/fixtures/local-map-subset/. runtime hostPort is 18080 so the
# stack can coexist with `make dev-up` on 8080. artifact store is the FS
# adapter on the mars-artifact-store PVC; S3-parity coverage is out of
# scope for this overlay (separate Garage Quadlet follow-up).

resources:
  - ../../base
  - pvcs.yaml
  # postgis spec is single-sourced under overlays/local; reuse by reference.
  - ../local/postgis-deployment.yaml
  - ../local/postgis-service.yaml
  - ../local/postgis-secret.yaml
  - fixture-loader-job.yaml

configMapGenerator:
  - name: mars-postgis-init
    files:
      - init.sql=../../../dev/postgis/init.sql
    options:
      labels:
        app.kubernetes.io/part-of: postgis
  - name: mars-fixture-sql
    files:
      - assert-fixture.sql=../../../tests/e2e/fixtures/local-map-subset/assert-fixture.sql
      - create-replication.sql=../../../tests/e2e/fixtures/local-map-subset/create-replication.sql
    options:
      labels:
        app.kubernetes.io/part-of: fixture-loader

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/mars/mars
    newName: localhost/mars
    newTag: e2e

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: mars

patches:
  - path: mars-config-patch.yaml
    target:
      kind: ConfigMap
      name: mars-config
  - path: compiler-volume-patch.yaml
    target:
      kind: Deployment
      name: mars-compiler
  - path: runtime-volume-patch.yaml
    target:
      kind: Deployment
      name: mars-runtime
