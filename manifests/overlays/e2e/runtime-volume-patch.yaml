apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-runtime
spec:
  template:
    spec:
      initContainers:
        - name: chown-data-dirs
          image: docker.io/library/busybox:stable
          imagePullPolicy: IfNotPresent
          command: ["chown", "-R", "65532:65532", "/cache"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: cache
              mountPath: /cache
      containers:
        - name: runtime
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              # 18080 keeps the e2e stack off port 8080 so a running dev
              # stack can coexist on the same host.
              hostPort: 18080
              protocol: TCP
          volumeMounts:
            - name: artifact-store
              mountPath: /var/lib/mars/store
              readOnly: true
      volumes:
        - name: artifact-store
          persistentVolumeClaim:
            claimName: mars-artifact-store
