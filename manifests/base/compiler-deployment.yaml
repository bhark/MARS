apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-compiler
  labels:
    app.kubernetes.io/part-of: compiler
    app.kubernetes.io/component: compiler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: compiler
  template:
    metadata:
      labels:
        app.kubernetes.io/component: compiler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compiler
          image: ghcr.io/mars/mars:latest
          args: ["--mode", "compiler", "--config", "/etc/mars/mars.yaml"]
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: mars-postgis
                  key: PG_DSN
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/mars/mars.yaml
              subPath: mars.yaml
              readOnly: true
            - name: cache
              mountPath: /cache
            - name: work
              mountPath: /work
      volumes:
        - name: config
          configMap:
            name: mars-config
        - name: cache
          persistentVolumeClaim:
            claimName: mars-compiler-cache
        - name: work
          persistentVolumeClaim:
            claimName: mars-compiler-work
