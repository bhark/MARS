apiVersion: apps/v1
kind: Deployment
metadata:
  name: mars-runtime
  labels:
    app.kubernetes.io/part-of: runtime
    app.kubernetes.io/component: runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/component: runtime
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runtime
          image: ghcr.io/mars/mars:latest
          args: ["--mode", "runtime", "--config", "/etc/mars/mars.yaml"]
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: mars-postgis
                  key: PG_DSN
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/mars/mars.yaml
              subPath: mars.yaml
              readOnly: true
            - name: cache
              mountPath: /cache
      volumes:
        - name: config
          configMap:
            name: mars-config
        - name: cache
          persistentVolumeClaim:
            claimName: mars-runtime-cache
